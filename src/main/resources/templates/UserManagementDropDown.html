<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>User Management</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex">

    <!-- Left Sidebar -->
    <!-- Left Sidebar -->
<div class="w-64 bg-gradient-to-b from-blue-700 to-blue-500 min-h-screen p-4 text-white shadow-lg">

    <!-- Title -->
    <h1 class="text-xl font-bold mb-6 tracking-wide">Dashboard</h1>

    <!-- Dropdown Button -->
    <button onclick="toggleDropdown()" 
        class="w-full flex justify-between items-center bg-blue-800 px-4 py-3 rounded-lg hover:bg-blue-900 transition duration-300 shadow">

        <span class="flex items-center gap-2">
             <span>User Management</span>
        </span>
        <span id="arrow" class="transition-transform duration-300">▼</span>
    </button>

    <!-- Dropdown Menu -->
    <div id="dropdownMenu" 
        class="hidden mt-3 bg-white text-gray-800 rounded-lg shadow-lg overflow-hidden transition-all duration-300">

        <a href="/UserTypeSelect" 
           class="flex items-center gap-2 px-4 py-3 hover:bg-blue-100 transition">
             User Reports
        </a>


    </div>
</div>

    <!-- Script -->
    <script>
        function toggleDropdown() {
            document.getElementById("dropdownMenu").classList.toggle("hidden");
        }
        function toggleDropdown() {
    const menu = document.getElementById("dropdownMenu");
    const arrow = document.getElementById("arrow");

    menu.classList.toggle("hidden");

    // Rotate arrow
    arrow.classList.toggle("rotate-180");
}

        
    </script>

</body>
</html>
