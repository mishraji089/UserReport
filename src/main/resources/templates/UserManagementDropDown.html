<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>User Management</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex">

    <!-- Left Sidebar -->
    <div class="w-64 bg-blue-600 min-h-screen p-4 text-white">

        <!-- Dropdown Button -->
        <button onclick="toggleDropdown()" class="w-full bg-blue-800 px-4 py-2 rounded text-left">
            User Management ▼
        </button>

        <!-- Dropdown Menu -->
        <div id="dropdownMenu" class="hidden mt-2 bg-white text-black rounded shadow">
            <a href="/UserTypeSelect" class="block px-4 py-2 hover:bg-gray-200">
    User Reports
			</a>
        </div>

    </div>

    <!-- Main Content -->
    <div class="flex-1 p-6">

        <!-- User Reports Section -->
        <div id="reports" class="hidden">
            <h2 class="text-2xl font-semibold">User Reports</h2>
        </div>

    </div>

    <!-- Script -->
    <script>
        function toggleDropdown() {
            document.getElementById("dropdownMenu").classList.toggle("hidden");
        }

        
    </script>

</body>
</html>
